<ul class="pl-4 space-y-1 border-l border-gray-200">
  <li *ngFor="let node of nodes">

    <div
      class="flex items-center gap-2 px-2 py-1 rounded cursor-pointer
             hover:bg-gray-100 transition-colors"
      (click)="toggle(node)"
    >

      <!-- Flecha expand -->
      <span *ngIf="node.children?.length" class="w-4 text-gray-500">
        <svg *ngIf="!node.expanded" xmlns="http://www.w3.org/2000/svg"
          fill="none" viewBox="0 0 24 24" stroke-width="2"
          stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 5l7 7-7 7"/>
        </svg>

        <svg *ngIf="node.expanded" xmlns="http://www.w3.org/2000/svg"
          fill="none" viewBox="0 0 24 24" stroke-width="2"
          stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19 9l-7 7-7-7"/>
        </svg>
      </span>

      <!-- ICONO MENÚ / SUBMENÚ -->
      <!--<svg
        *ngIf="node.children?.length"
        xmlns="http://www.w3.org/2000/svg"
        fill="none" viewBox="0 0 24 24"
        stroke-width="2" stroke="currentColor"
        class="w-5 h-5"
        [class.text-blue-600]="level === 0"
        [class.text-indigo-500]="level > 0"
      >
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 6h18M3 12h18M3 18h18"/>
      </svg>-->
      <svg *ngIf="node.children?.length" class="w-5 h-5 stroke-red-mafe" fill="#000000" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"><path d="M2 3C.9 3 0 3.9 0 5v2c0 1.1.9 2 2 2h21c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 1h21c.563 0 1 .437 1 1v2c0 .563-.437 1-1 1H2c-.563 0-1-.437-1-1V5c0-.563.437-1 1-1zm0 17.5v2c0 .262.238.5.5.5h6.813l-1.157 1.125c-.48.497.28 1.157.688.72l2-2c.193-.187.193-.534 0-.72l-2-2c-.397-.397-1.14.268-.688.72L9.312 23H3v-1.5c0-.665-1-.644-1 0zm14-.5c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-2c0-1.1-.9-2-2-2zm0 1h12c.563 0 1 .437 1 1v2c0 .563-.437 1-1 1H16c-.563 0-1-.437-1-1v-2c0-.563.437-1 1-1zM2 12c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h21c1.1 0 2-.9 2-2v-2c0-1.1-.9-2-2-2zm0 1h21c.563 0 1 .437 1 1v2c0 .563-.437 1-1 1H2c-.563 0-1-.437-1-1v-2c0-.563.437-1 1-1z"></path></g></svg>

      <!-- ICONO OPCIÓN FINAL (SIN HIJOS) -->
      <svg
        *ngIf="!node.children?.length"
        xmlns="http://www.w3.org/2000/svg"
        fill="none" viewBox="0 0 24 24"
        stroke-width="2" stroke="currentColor"
        class="w-5 h-5 stroke-red-mafe"
        [class.text-blue-600]="level === 0"
        [class.text-indigo-500]="level > 0"
      >
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 6h18M3 12h18M3 18h18"/>
      </svg>

      <!-- Checkbox -->
      <input
        *ngIf="showCheckboxes"
        type="checkbox"
        class="rounded text-blue-600"
        [checked]="node.checked"
        (click)="toggleCheck(node, $event)"
      />

      <!-- Texto -->
      <span
        class="select-none"
        [class.font-semibold]="level === 0"
        [class.text-gray-800]="level === 0"
        [class.text-gray-600]="level > 0 && node.children?.length"
        [class.text-gray-700]="!node.children?.length"
      >
        {{ node.label }}
      </span>
    </div>

    <!-- Subárbol -->
    <app-tree-view
      *ngIf="node.expanded && node.children?.length"
      [nodes]="node.children ?? []"
      [level]="level + 1"
      [showCheckboxes]="showCheckboxes"
    ></app-tree-view>

  </li>
</ul>

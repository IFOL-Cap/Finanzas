<div #modalCalc id="modalCalc" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
  <div class="relative p-4 w-full max-w-2xl max-h-full">
      <!-- Modal content -->
      <div class="relative bg-white rounded-lg shadow dark:bg-gray-700">
          <!-- Modal header -->
          <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600">
              <h3 class="text-xl font-semibold text-gray-900 dark:text-white">
                 Calculadora de descuento
              </h3>
              <button type="button" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white" data-modal-hide="modalCalc">
                  <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                  </svg>
                  <span class="sr-only">Close modal</span>
              </button>
          </div>
          <!-- Modal body -->
          <div class="md:px-5 space-y-4">
            <div class="divide-y-2">
              <div class="flex justify-between items-center p-4">
                  <label for="" class="text-base w-1/2 ">Especifica el porcentaje de descuento.</label>
                  <app-input class="w-1/2 md:w-1/3"
                      [inputConfig]="{
                      type: 'text',
                      pattern: '',
                      isRequired: false,
                      placeHolder: '0.00%',
                      isDisabled: false,
                      isHidden: false,
                      isRead: false,
                    }"
                  ></app-input>
              </div>
              <div class="flex justify-between p-4">
                  <label for="" class="text-base  w-1/2 ">Monto a descontar de la prima total.</label>
                  <app-input class="w-1/2 md:w-1/3"
                      [inputConfig]="{
                      type: 'text',
                      pattern: '',
                      isRequired: false,
                      placeHolder: '0.00%',
                      isDisabled: false,
                      isHidden: false,
                      isRead: false,
                    }"
                  ></app-input>
              </div>
              <div class="flex justify-between p-4">
                  <label for="" class="text-base  w-1/2 ">Monto objetivo de la prima neta deseada.</label>
                  <app-input class="w-1/2 md:w-1/3"
                      [inputConfig]="{
                      type: 'text',
                      pattern: '',
                      isRequired: false,
                      placeHolder: '0.00%',
                      isDisabled: false,
                      isHidden: false,
                      isRead: false,
                    }"
                  ></app-input>
              </div>
              <div class="flex justify-between p-4">
                  <label for="" class="text-base w-1/2 " >Monto objetivo de la prima total deseada.</label>
                  <app-input class="w-1/2 md:w-1/3"
                      [inputConfig]="{
                      type: 'text',
                      pattern: '',
                      isRequired: false,
                      placeHolder: '0.00%',
                      isDisabled: false,
                      isHidden: false,
                      isRead: false,
                    }"
                  ></app-input>
              </div>
          </div>
             
          </div>
          <!-- Modal footer -->
          <div class=" p-4 md:px-5 border-t border-gray-200 rounded-b dark:border-gray-600">
           
              <div class="flex justify-end">
                <app-button class="w-1/3">Aceptar</app-button>
              </div>
            
          </div>
      </div>
  </div>
</div>

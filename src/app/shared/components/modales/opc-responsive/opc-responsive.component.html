

<div #modalOpc id="modalOpc" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
    <div class="relative p-4 w-full max-w-2xl max-h-full">
        <!-- Modal content -->
        <div class="relative bg-white rounded-lg shadow dark:bg-gray-700">
            <!-- Modal header -->
            <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600">
                <h3 class=" text-xl font-semibold text-gray-900 dark:text-white">
                    Opciones de la cotización
                </h3>
                <button type="button" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg  w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white" data-modal-hide="modalOpc">
                    <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Close modal</span>
                </button>
            </div>
            <!-- Modal body -->
            <div class="md:px-5 space-y-4">
                
                <div class="flex flex-col text-base p-3">
                    <button
                        (click)="open('save')"
                        type="button"
                        class="mr-4 text-gray-900  bg-white hover:bg-gray-100  border-gray-200 focus:ring-4 focus:outline-none focus:ring-gray-100 font-medium rounded-lg px-5 py-2.5 text-center inline-flex items-center dark:focus:ring-gray-600 dark:bg-gray-800 dark:border-gray-700 dark:text-white dark:hover:bg-gray-700 me-2 mb-2"
                    >
                        <img class="pr-3" src="/assets/icons/save.svg" alt="" />
                        Guardar
                    </button>
                    <button
                        (click)="open('print')"
                        type="button"
                        class="mr-4 text-gray-900 bg-white hover:bg-gray-100  border-gray-200 focus:ring-4 focus:outline-none focus:ring-gray-100 font-medium rounded-lg  px-5 py-2.5 text-center inline-flex items-center dark:focus:ring-gray-600 dark:bg-gray-800 dark:border-gray-700 dark:text-white dark:hover:bg-gray-700 me-2 mb-2"
                    >
                        <img class="pr-3" src="/assets/icons/printer.svg" alt="" />
                        Imprimir
                    </button>
                    <button
                        (click)="open('send')"
                        type="button"
                        class="text-gray-900 bg-white hover:bg-gray-100  border-gray-200 focus:ring-4 focus:outline-none focus:ring-gray-100 font-medium rounded-lg  px-5 py-2.5 text-center inline-flex items-center dark:focus:ring-gray-600 dark:bg-gray-800 dark:border-gray-700 dark:text-white dark:hover:bg-gray-700 me-2 mb-2"
                    >
                        <img class="pr-3" src="/assets/icons/mail.svg" alt="" />
                        Enviar
                    </button>
                </div>
            </div>
            <!-- Modal footer -->
            <div class=" p-4 md:px-5 border-t border-gray-200 rounded-b dark:border-gray-600">
                
            </div>
        </div>
    </div>
  </div>

<div id="modalMessage" tabindex="-1" aria-hidden="true" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-15 w-full max-h-full">
	<div class="relative p-4 w-full max-w-2xl bg-white rounded-lg shadow dark:bg-gray-700">
		<!-- Modal header -->
		<div class="flex justify-between items-center p-4 border-b dark:border-gray-600">
			<h3 class="text-[16px] font-bold text-[#2D373D]">{{ modalMessage?.title }}</h3>
			<button (click)="closeModal()" class="text-[#818080]">
				<img src="/assets/icons/CLOSE.svg" alt="">
			</button>
		</div>
		<!-- Modal body -->
		<div class="p-4 font-normal text-sm rounded-md border-2"
			[ngClass]="{
				'border-green-500': status === 'success',
				'border-red-mafe': status === 'error',
				'bg-green-50': status === 'success',
				'bg-red-50': status === 'error',
				'text-green-700': status === 'success',
				'text-red-mafe': status === 'error'
			}"
			[attr.role]="ariaRole">
			<h1 class="font-normal text-lg font-rbt-rglr mb-2"
				[ngClass]="{
				'text-green-800': status === 'success',
				'text-red-mafe': status === 'error'
				}">
				{{ modalMessage?.message }}
			</h1>
		</div>

		<!--<div class="p-4 font-normal text-sm">
			<h1 class="font-normal text-lg text-[#13171A] font-rbt-rglr mb-2">{{modalMessage?.message}}</h1>
		</div>-->
		<!-- Modal footer -->
		<div class="flex flex-col md:flex-row justify-end space-y-4 md:space-y-0 p-4 border-t dark:border-gray-600">
			<app-button (click)="closeModal()" class="mr-2"
				[buttonConfig]="{
					type: 2,
					label: '',
					isDisabled: false,
				}">
				Cancelar
			</app-button>
            <app-button
				[buttonConfig]="{
					type: 0,
					label: '',
					isDisabled: false,
				}">
				Aceptar
			</app-button>
		</div>
	</div>
</div>

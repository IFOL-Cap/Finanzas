<nav
  class="fixed flex h-20 top-0 z-50 w-full bg-white border-b border-gray-200 dark:bg-gray-800 dark:border-gray-700"
>
  <div class="md:hidden flex items-center w-full justify-between">
    <div>
      <button
        (click)="barraResp()"
        data-drawer-target="logo-sidebar"
        data-drawer-toggle="logo-sidebar"
        aria-controls="logo-sidebar"
        type="button"
        class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg dark:text-gray-400 dark:hover:bg-gray-700 dark:focus:ring-gray-600"
      >
        <img src="/assets/icons/burguer.svg" alt="" />
      </button>
    </div>

    <div class="ml-5 flex items-center px-3 flex-g">
      <div class="flex items-center">
        @if (isSearch) {
          <app-search
            class="w-64"
            [isSearch]="isSearch"
            (close)="closeInput($event)"
          ></app-search>
        } @else {
          <button (click)="isSearch = !isSearch">
            <img width="16" height="16" src="/assets/icons/search.svg" alt="" />
          </button>
        }
      </div>
      <div class="ml-4">
        <img src="/assets/icons/Notification-Bell.svg" alt="" />
      </div>
      <div class="ml-4">
        <img
          class="h-20 w-24"
          src="/assets/logosNewMapfre/AF_MAPFRE_SYMBOL_CMYK_RED.jpg"
          alt=""
        />
      </div>
    </div>
  </div>

  <div
    class="w-2/6 hidden md:flex items-center h-20"
    [ngClass]="isSearch ? 'w-2/6' : 'w-3/5'"
  >
    <div class="hidden md:flex justify-start items-start ml-3">
      <div>
        <button (click)="barra()">
          <img src="/assets/icons/menu/Sidebar.svg" alt="" />
        </button>
      </div>
      <div class="" [ngClass]="isOpen ? 'sm:ml-5' : 'ml-5'">
        <nav class="flex" aria-label="Breadcrumb">
          <ol
            class="font-rbt-bold text-item-bread text-base inline-flex items-center space-x-1 md:space-x-2 rtl:space-x-reverse"
          >
            <li class="inline-flex items-center">
              <a
                href="#"
                class="inline-flex items-center hover:text-blue-600 dark:text-gray-400 dark:hover:text-white"
              >
                Inicio
              </a>
            </li>

            @if (isSearch) {
              <svg
                class="rtl:rotate-180 w-3 h-3 text-gray-400 mx-1"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 6 10"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="m1 9 4-4-4-4"
                />
              </svg>

              <span class="px-2">... </span>
              <li aria-current="page">
                <div class="flex items-center">
                  <svg
                    class="rtl:rotate-180 w-3 h-3 text-gray-400 mx-1"
                    aria-hidden="true"
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 6 10"
                  >
                    <path
                      stroke="currentColor"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="m1 9 4-4-4-4"
                    />
                  </svg>
                  <span class="ms-1 md:ms-2 dark:text-gray-400"
                    >Cotizador
                  </span>
                </div>
              </li>
            } @else {
              <li>
                <div class="flex items-center">
                  <svg
                    class="rtl:rotate-180 w-3 h-3 text-gray-400 mx-1"
                    aria-hidden="true"
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 6 10"
                  >
                    <path
                      stroke="currentColor"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="m1 9 4-4-4-4"
                    />
                  </svg>
                  <!--Vida-->
                  <a
                    href="#"
                    class="ms-1 hover:text-blue-600 md:ms-2 dark:text-gray-400 dark:hover:text-white"
                    >Fianzas</a
                  >
                </div>
              </li>
              <!---
							  <li aria-current="page">
								<div class="flex items-center">
								  <svg class="rtl:rotate-180 w-3 h-3 text-gray-400 mx-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
									<path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/>
								  </svg>
								  <span class="ms-1  md:ms-2 dark:text-gray-400">Cotiza y Emite - {{flowTitle}}</span>
								</div>
							  </li>
							  <li aria-current="page">
								<div class="flex items-center">
								  <svg class="rtl:rotate-180 w-3 h-3 text-gray-400 mx-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
									<path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/>
								  </svg>
								  <span class="ms-1  md:ms-2 dark:text-gray-400">Cotizador </span>
								</div>
							  </li>
							-->
            }
          </ol>
        </nav>
      </div>
    </div>
  </div>

  <div
    class="hidden md:flex pr-5 items-center justify-end"
    [ngClass]="isSearch ? 'w-3/5' : 'w-2/6'"
  >
    <div class="ml-5 flex items-center">
      @if (isSearch) {
        <app-search
          class="w-80"
          [isSearch]="isSearch"
          (close)="closeInput($event)"
        ></app-search>
      } @else {
        <button (click)="isSearch = !isSearch">
          <img width="24" height="24" src="/assets/icons/search.svg" alt="" />
        </button>
      }
    </div>

    <div class="ml-5">
      <img
        width="20"
        height="20"
        src="/assets/icons/Notification-Bell.svg"
        alt=""
      />
    </div>

    <div class="mx-8">
      <button
        class="text-red-mafe text-sm font-normal font-rbt-rglr"
        (click)="logout()"
      >
        Cerrar Sesión
      </button>
    </div>

    <div class="flex flex-col items-end justify-center flex-1 pr-4">
      <div class="w-full h-16 flex items-center justify-end">
        <img
          class="h-full object-contain"
          src="/assets/logosNewMapfre/AF_MAPFRE_LOGOTYPE_HOR_CMYK_RED BG.jpg"
          alt="user photo"
        />
      </div>
      <div class="mt-1">
        <p class="text-fecha text-end font-normal font-rbt-rglr text-sm">
          {{ today | date: "MMMM dd, yyyy" | titlecase }}
        </p>
      </div>
    </div>
  </div>
</nav>

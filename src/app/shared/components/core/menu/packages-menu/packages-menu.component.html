<div class="w-full">
    <app-save-quote></app-save-quote>
    <app-print></app-print>
    <app-send></app-send>
    <app-opc-responsive (isOpenSave)="show($event)"></app-opc-responsive>
    <div class="flex py-4 items-center justify-between">
        <div>
            @if (isWithCalculator) {
                <button
                    class="bg-button-calc text-red-mafe text-base rounded-lg p-3"
                    (click)="showModal()"
                >
                    Calculadora de descuento
                </button>

            }
        </div>

        <div class="hidden md:flex md:items-center">
            <div>
                <button
                    (click)="showSave()"
                    type="button"
                    class="text-gray-900 bg-white hover:bg-gray-100 border border-gray-200 focus:ring-4 focus:outline-none focus:ring-gray-100 font-medium rounded-lg text-sm px-5 py-2.5 text-center inline-flex items-center dark:focus:ring-gray-600 dark:bg-gray-800 dark:border-gray-700 dark:text-white dark:hover:bg-gray-700 me-2"
                >
                    <img class="pr-3" src="/assets/icons/save.svg" alt="" />
                    Guardar
                </button>
            </div>
            <div>
                <button
                    (click)="showPrint()"
                    type="button"
                    class="text-gray-900 bg-white hover:bg-gray-100 border border-gray-200 focus:ring-4 focus:outline-none focus:ring-gray-100 font-medium rounded-lg text-sm px-5 py-2.5 text-center inline-flex items-center dark:focus:ring-gray-600 dark:bg-gray-800 dark:border-gray-700 dark:text-white dark:hover:bg-gray-700 me-2"
                >
                    <img class="pr-3" src="/assets/icons/printer.svg" alt="" />
                    Imprimir
                </button>
            </div>
            <button
                (click)="showSend()"
                type="button"
                class="text-gray-900 bg-white hover:bg-gray-100 border border-gray-200 focus:ring-4 focus:outline-none focus:ring-gray-100 font-medium rounded-lg text-sm px-5 py-2.5 text-center inline-flex items-center dark:focus:ring-gray-600 dark:bg-gray-800 dark:border-gray-700 dark:text-white dark:hover:bg-gray-700 me-2"
            >
                <img class="pr-3" src="/assets/icons/mail.svg" alt="" />
                Enviar
            </button>
        </div>
        <div class="md:hidden">
            <button
                (click)="showOpc()"
                type="button"
                class="text-gray-900 bg-white hover:bg-gray-100 border border-gray-200 focus:ring-4 focus:outline-none focus:ring-gray-100 font-medium rounded-lg text-sm px-5 py-2.5 text-center inline-flex items-center dark:focus:ring-gray-600 dark:bg-gray-800 dark:border-gray-700 dark:text-white dark:hover:bg-gray-700 me-2 mb-2"
            >
                <img class="pr-3" src="/assets/icons/dots-vertical.svg" alt="" />
                Opciones
            </button>
        </div>
    </div>

</div>

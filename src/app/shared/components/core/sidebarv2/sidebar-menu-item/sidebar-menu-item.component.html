<li class="list-none">

  @if (hasChildren) {

    <!-- Nodo con hijos: botón que expande/colapsa -->
    <button
      type="button"
      class="flex w-full items-center justify-between px-3 py-3 rounded-md transition-colors hover:bg-gray-800"
      [class.text-red-mafe]="isOpen"
      (click)="toggle()"
    >
      <div class="flex items-center gap-3 min-w-0">
        <img
          [src]="isOpen ? (item.iconActive ?? item.icon) : item.icon"
          [alt]="item.name"
          class="w-5 h-5 shrink-0"
        />
        <span class="text-sm truncate">{{ item.name }}</span>
      </div>

      <!-- Chevron rotado cuando está abierto -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-4 h-4 shrink-0 transition-transform duration-200"
        [class.rotate-180]="isOpen"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    </button>

    <!-- Hijos: llamada recursiva al mismo componente -->
    @if (isOpen) {
      <ul class="border-l border-gray-700 ml-4 pl-1 space-y-0.5">
        @for (child of item.opciones; track child.id) {
          <app-sidebar-menu-item [item]="child" [depth]="depth + 1" />
        }
      </ul>
    }

  } @else {

    <!-- Hoja: enlace de navegación -->
    <a
      [routerLink]="item.path"
      routerLinkActive="itemActived"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex w-full items-center gap-3 px-3 py-3 rounded-md transition-colors hover:bg-gray-800 text-gray-300"
    >
      <img [src]="item.icon" [alt]="item.name" class="w-5 h-5 shrink-0" />
      <span class="text-sm truncate">{{ item.name }}</span>
    </a>

  }

</li>

<li class="list-none sidebar-flyout-container relative" [class.is-open]="isOpen" (closeAllMenus)="resetMenu()">
  @if (hasChildren) {
    <!-- Botón con hijos que abre panel flotante -->
    <button
      type="button"
      class="flex w-full items-center justify-between px-3 py-3 rounded-md transition-colors hover:bg-gray-800 text-gray-200"
      (click)="toggleMenu()"
    >
      <div class="flex items-center gap-3 min-w-0">
        <img
          [src]="item.iconActive ?? item.icon"
          [alt]="item.name"
          class="w-5 h-5 shrink-0"
        />
        <span class="text-sm truncate">{{ item.name }}</span>
      </div>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-4 h-4 shrink-0"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="m9 6 6 6-6 6" />
      </svg>
    </button>

    <!-- Panel flotante con opciones recursivas -->
    <ul class="sidebar-flyout-panel space-y-1">
      @for (child of item.opciones; track child.id) {
        <app-sidebar-menu-item
          [item]="child"
          [depth]="depth + 1"
          (menuItemClicked)="closeMenu(); menuItemClicked.emit()"
          (closeAllMenus)="resetMenu(); closeAllMenus.emit()"
        />
      }
    </ul>
  } @else {
    <!-- Hoja: enlace de navegación -->
    <a
      [routerLink]="item.path"
      routerLinkActive="itemActived"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex w-full items-center gap-3 px-3 py-3 rounded-md transition-colors hover:bg-gray-800 text-gray-300"
      (click)="onItemClick()"
    >
      <img [src]="item.icon" [alt]="item.name" class="w-5 h-5 shrink-0" />
      <span class="text-sm truncate">{{ item.name }}</span>
    </a>
  }
</li>

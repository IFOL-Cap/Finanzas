<div class="w-full">
    <table mat-table [dataSource]="dataSource">
  
      <!-- Position Column -->
      <ng-container matColumnDef="numPoliza">
        <th mat-header-cell *matHeaderCellDef class="text-[#616364] text-sm font-rbt-bold ">
            <div class="w-full flex items-center justify-between">
              <app-check></app-check>
                <!-- <input id="default-checkbox" type="checkbox"
             class="w-4 h-4 text-red-mafe  border-[#A5A7A8] rounded mr-2 ">  -->
             <span class="pt-0.5">NO. PÓLIZA</span>
             <img src="assets/icons/sort.svg" alt="">
            </div> 
        </th>
        <td mat-cell *matCellDef="let element" class="text-[#72797D] text-xs font-mpf-rglr ">
            <div class="flex items-center">
              <app-check></app-check><span class="pt-0.5">{{element.numPoliza}}</span>
            </div>
             </td>
      </ng-container>
  
      <!-- Name Column -->
      <ng-container matColumnDef="contratante">
        <th mat-header-cell *matHeaderCellDef class="text-[#616364] text-sm font-rbt-bold ">
            <div class="w-full flex items-center justify-between">
             <span class="pt-0.5">CONTRATANTE</span>
             <img src="assets/icons/sort.svg" alt="">
            </div> 
         </th>
        <td mat-cell *matCellDef="let element" class="text-[#72797D] text-xs font-mpf-rglr "> {{element.contratante}} </td>
      </ng-container>
  
      <!-- Weight Column -->
      <ng-container matColumnDef="producto">
        <th mat-header-cell *matHeaderCellDef class="text-[#616364] text-sm font-rbt-bold "> 
            <div class="w-full flex items-center justify-between">
                <span class="pt-0.5">PRODUCTO</span>
                <img src="assets/icons/sort.svg" alt="">
            </div>

        </th>
        <td mat-cell *matCellDef="let element" class="text-[#72797D] text-xs font-mpf-rglr "> {{element.producto}} </td>
      </ng-container>
  
      <!-- Symbol Column -->
      <ng-container matColumnDef="contacto">
        <th mat-header-cell *matHeaderCellDef class="text-[#616364] text-sm font-rbt-bold "> 
            <div class="w-full flex items-center justify-between">
                <span class="pt-0.5">CONTACTO</span>
                <img src="assets/icons/sort.svg" alt="">
            </div>
         </th>
        <td mat-cell *matCellDef="let element" class="text-[#72797D] text-xs font-mpf-rglr "> {{element.contacto}} </td>
      </ng-container>

      <!-- Symbol Column -->
      <ng-container matColumnDef="fecha">
        <th mat-header-cell *matHeaderCellDef class="text-[#616364] text-sm font-rbt-bold "> 
            <div class="w-full flex items-center justify-between">
                <span class="pt-0.5">FECHA</span>
                <img src="assets/icons/sort.svg" alt="">
            </div>
        </th>
        <td mat-cell *matCellDef="let element" class="text-[#72797D] text-xs font-mpf-rglr "> {{element.fecha}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="text-[#616364] text-sm font-rbt-bold "> ACCIONES </th>
        <td mat-cell *matCellDef="let element"> 
            <div class="w-full">
                <app-actions></app-actions>
            </div>
        </td>
      </ng-container>
  
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <app-paginator #paginatorQuotations [pageSizeOptions]="pageSizeOptions"></app-paginator>
    <!-- <mat-paginator [pageSizeOptions]="[ 5, 3, 2]"
                   showFirstLastButtons

                   aria-label="Select page of periodic elements">
    </mat-paginator> -->
  </div>

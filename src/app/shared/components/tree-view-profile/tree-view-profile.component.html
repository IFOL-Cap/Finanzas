<ul class="pl-4 space-y-1 border-l border-gray-200">
  <li *ngFor="let node of nodes">

    <div
      class="relative flex items-center gap-2 px-2 py-1 rounded cursor-pointer
             hover:bg-gray-100 transition-colors"
      (click)="toggle(node)"
      (contextmenu)="onRightClick($event, node)"
    >

      <!-- FLECHA -->
      <span *ngIf="node.children?.length" class="w-4 text-gray-500">
        <svg *ngIf="!node.expanded" class="w-4 h-4" viewBox="0 0 24 24">
          <path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" fill="none"/>
        </svg>
        <svg *ngIf="node.expanded" class="w-4 h-4" viewBox="0 0 24 24">
          <path d="M19 9l-7 7-7-7" stroke="currentColor" stroke-width="2" fill="none"/>
        </svg>
      </span>

      <!-- ICONOS (N niveles) -->
      <!-- ROOT -->
      <!--<svg *ngIf="getIconType(node) === 'root'"
           class="w-5 h-5 text-blue-600"
           fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-width="2" d="M3 4h18v16H3z"/>
      </svg>-->

      <svg *ngIf="getIconType(node) === 'root'" 
            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 stroke-red-mafe">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
      </svg>


      <!-- FOLDER -->
      <!--<svg *ngIf="getIconType(node) === 'folder'"
           class="w-5 h-5 text-indigo-500"
           fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-width="2" d="M4 4h6l2 2h8v14H4z"/>
      </svg>-->

      <svg *ngIf="getIconType(node) === 'folder'"
        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="w-5 h-5 stroke-red-mafe">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
      </svg>


      <!-- LEAF -->
      <!--<svg *ngIf="getIconType(node) === 'leaf'"
           class="w-5 h-5 text-gray-500"
           fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-width="2" d="M6 4h12v16H6z"/>
      </svg>-->

      <svg *ngIf="getIconType(node) === 'leaf'" 
        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-gray-500">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
      </svg>

      <!-- CHECKBOX -->
      <input
        *ngIf="shouldShowCheckbox()"
        type="checkbox"
        class="rounded text-blue-600"
        [checked]="node.checked"
        (click)="onCheckboxClick($event, node)"
      />

      <!-- TEXTO -->
      <span class="select-none">
        {{ node.label }}
      </span>
    </div>

    <!-- SUBÁRBOL -->
    <app-tree-view-profile
      *ngIf="node.expanded && node.children?.length"
      [nodes]="node.children ?? []"
      [level]="level + 1"
    ></app-tree-view-profile>

  </li>
</ul>

<!-- MENÚ CONTEXTUAL GLOBAL -->
<div
  *ngIf="(ContextMenuServiceService.menu$ | async)?.visible
    && ((ContextMenuServiceService.menu$ | async)?.node.level === 0 || 
        (ContextMenuServiceService.menu$ | async)?.node.level === 1)"
  class="fixed z-50 bg-white shadow-lg border rounded-md text-sm w-44"
  [style.left.px]="(ContextMenuServiceService.menu$ | async)?.x"
  [style.top.px]="(ContextMenuServiceService.menu$ | async)?.y"
>
  <ul class="py-1">
    <li class="menu-item" *ngIf="(ContextMenuServiceService.menu$ | async)?.node.level === 0">
      ➕ Nuevo
    </li>

    <li class="menu-item" *ngIf="(ContextMenuServiceService.menu$ | async)?.node.level === 1">
      ✏️ Modificar
    </li>

    <li class="menu-item text-red-600" *ngIf="(ContextMenuServiceService.menu$ | async)?.node.level === 1">
      🗑 Eliminar
    </li>
  </ul>
</div>

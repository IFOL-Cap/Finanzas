<div class="label-help max-w-[100%] grid grid-col-1 pr-4">
    <div class="label-help_title flex text-base text-black-title font-rbt-bold">
      <span class="text-justify">{{labelHelp.title}}</span> <span class="text-[#F58E07]" *ngIf="labelHelp.isRquired">*</span>   
      <span  attr.data-tooltip-target="{{ labelHelp.idTool }}" data-tooltip-style="light">
        <img 
              #imgHelp
              *ngIf="labelHelp.isWithHelp"
             
               src="assets/icons/question.svg" alt="question" class="ml-2">

      </span>
      <div [id]="labelHelp.idTool" role="tooltip" 
           
           class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-gray-900 bg-white  rounded-lg shadow-sm opacity-0 tooltip"
           >
                {{ labelHelp.helpMsg }}
        <div class="tooltip-arrow" data-popper-arrow></div>
      </div>
    </div>
    <div *ngIf="labelHelp.isWithSubtitle" class="label-help_description text-xs text-gray-subtitle">
        {{labelHelp.subtitle}}
    </div>
</div>

<div class="bg-gray-encabezado font-rbt-bold text-sm p-3 flex justify-between border-y-2 border-gray-division-section ">
    <span [ngClass]="{'text-red-mafe underline decoration-solid': encaberzadoConfig.colorRed}">{{ encaberzadoConfig.title }}</span>
    @if (encaberzadoConfig.isIcon) {
        <img  src="./assets/icons/checkRed.svg" alt="">
    } @else if (encaberzadoConfig.isGuion) {
        <span>-</span>
    }@else if (encaberzadoConfig.isCheck) {
        <div class="flex items-center ">
            <input id="red-checkbox" type="checkbox" value="" class="w-6 h-6 text-red-600 bg-gray-100 border-gray-300 rounded focus:ring-red-500 dark:focus:ring-red-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
            <label for="red-checkbox" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300"></label>
        </div>
    }
</div>

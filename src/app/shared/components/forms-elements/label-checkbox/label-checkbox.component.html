<div class="grid grid-cols-3  gap-y-2" [ngClass]="itemsChecks.length == 0 ? 'items-center': ''">
    <div class="col-span-3 md:col-span-1">
        <app-label-help
            [labelHelp]="labelHelp"
        />
    </div>
    <div class="col-span-3 md:col-span-1">
        @for (item of itemsChecks; track $index) {
            <app-check [title]="item.labeltitle" (checked)="change($event)"></app-check>
        }
    </div>

</div>

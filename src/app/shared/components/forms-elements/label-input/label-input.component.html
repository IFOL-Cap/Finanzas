<div class="grid grid-cols-3 items-center gap-y-2">
    <div class="col-span-3 md:col-span-1">
        <app-label-help [labelHelp]="labelHelp" />
        @if (labelInputConf.isWithLinks) {
            @for (questionLink of labelInputConf.links; track $index) {
                 <app-question-link [questionLConf]="questionLink"></app-question-link>
            }
        }

    
    </div>
    
    <div class="col-span-3 md:col-span-1">
        <app-input [inputConfig]="inputConfig" />
    </div>
    @if(labelInputConf.isCustom){
        <div class="col-span-3 md:col-span-1">
            @switch (labelInputConf.from) {
                @case (0) {
                    <app-protected-toggle (isCheckedtoogle)="onCheckedToggle($event)" [protectedToglleConfig]="pToggleConfg" />
                }
                @case(1){
                    <div class="hidden md:pl-4 md:w-1/3 md:inline-block">
                        <div class="vin-icon">
                            <img src="assets/imgs/vin.png" alt="">
                        </div>
                    </div>
                }
            }
            
        </div>
    }
</div>

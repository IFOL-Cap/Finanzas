<div class="relative w-full"
    [ngClass]="{'p-2': searchConf.type == 1 }"
>
    <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
        <svg class="w-4 h-4 text-gray-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
        </svg>
    </div>
    <input type="text" 
           [placeholder]="placeholder"
           class="bg-gray-50 border-0 border-gray-300 text-gray-900 text-sm rounded-lg  block w-full ps-10 p-2.5  "
           [ngClass]="{'bg-white border-0 border-white text-base text-[#575F64] font-rbt-rglr ': searchConf.type == 1 }" >
    @if (searchConf.type == 0) {
        <img (click)="closeInput()" src="/assets/icons/closeSearch.svg"  class="text-white absolute end-2.5 bottom-2.5 rounded-lg  px-4 py-2" />
        
    }@else {
        <div class="absolute inset-y-0 right-0 flex items-center  pr-3 ">
            <button class="rounded-lg bg-[#ECEFF1]  px-6 py-[15px] mr-2 text-sm font-rbt-mdm md:py-[14px] ">Buscar</button>
            <app-btn-menu class="hidden md:inline-block " [btnMuConfig]="{
                labelBtn: 'Filtros',
                labelMobile: '',
                from: 5,
                icon:9,
                isONlyIcon: false,
                iconUrl: ''
              }"></app-btn-menu>

            <app-btn-menu class="inline-block md:hidden" [btnMuConfig]="{
                labelBtn: 'Filtros',
                labelMobile: '',
                from: 5,
                isONlyIcon: true,
                iconUrl: 'assets/icons/home/filterWhite.svg'
            }"></app-btn-menu>
        </div>
    }
</div>

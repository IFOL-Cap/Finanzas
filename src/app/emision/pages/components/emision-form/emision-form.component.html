<div
  class="flex w-full items-center py-5 border-b border-gray-division-section"
>
  <app-label-select
    class="w-full"
    [labelHelp]="{
      isRequired: true,
      isWithHelp: true,
      isWithSubtitle: false,
      title: 'Ramo:',
      subtitle: '',
      position: 'right',
      helpMsg: 'ayuda',
    }"
    [selectConfig]="{
      type: 'text',
      pattern: '',
      isRequired: true,
      placeHolder: 'Selecciona una opción',
      isDisabled: false,
      isHidden: false,
      data: [{ value: '1', display: 'Seleccione' }],
      id: 2,
    }"
  />
</div>

<div
  class="w-full py-3 md:flex relative z-10 border-b border-gray-division-section"
>
  <div class="w-full md:w-1/3 flex items-center">
    <app-label-help
      [labelHelp]="{
        isRequired: true,
        isWithHelp: true,
        isWithSubtitle: false,
        title: 'Vigencia',
        subtitle: '',
        position: 'right',
        idTool: '',
        helpMsg: '',
      }"
    ></app-label-help>
  </div>

  <div class="w-full flex md:w-1/3 py-3 md:py-0 items-center gap-2">
    <span
      class="flex items-center text-base font-rbt-bold whitespace-nowrap shrink-0 min-w-[90px]"
    >
      Inicio:
    </span>

    <div class="w-4/5 max-w-[250px] pl-2 md:pl-4">
      <app-date
        class="w-full relative z-10 pointer-events-auto"
        [dateConfig]="{
          type: 'text',
          pattern: '',
          isRequired: true,
          placeHolder: 'Selecciona una fecha',
          isDisabled: false,
          isHidden: false,
        }"
      ></app-date>
    </div>
  </div>

  <div class="w-full flex md:w-1/3 md:pl-4">
    <span class="w-1/5 flex items-center text-base font-rbt-bold"> Fin: </span>

    <div class="w-4/5 max-w-[250px] pl-2 md:pl-4">
      <app-date
        class="w-full relative z-10 pointer-events-auto"
        [dateConfig]="{
          type: 'text',
          pattern: '',
          isRequired: true,
          placeHolder: 'Selecciona una fecha',
          isDisabled: false,
          isHidden: false,
        }"
      >
      </app-date>
    </div>
  </div>
</div>

<div
  class="flex w-full items-center py-5 border-b border-gray-division-section"
>
  <app-label-checkbox
    [labelCheck]="'Si'"
    class="w-full"
    [labelHelp]="{
      isRequired: false,
      isWithHelp: true,
      isWithSubtitle: false,
      title: 'Fiado Especial:',
      subtitle: '',
      position: 'right',
      helpMsg: 'ayuda',
    }"
    (isChecked)="changeCheck($event)"
    [itemsChecks]="[
      {
        labeltitle: 'Si',
      },
    ]"
  />
</div>

<div class="w-full py-3 md:flex relative z-10 border-b border-gray-division-section">
  <div class="w-full flex md:w-1/3 py-3 md:py-0 items-center gap-2">
    <span class="flex items-center text-base font-rbt-bold whitespace-nowrap shrink-0 min-w-[90px]">
      Fecha Fianza:
    </span>

    <div class="w-4/5 max-w-[180px] pl-2 md:pl-4">
      <app-date
        class="w-full relative z-10 pointer-events-auto"
        [dateConfig]="{
          type: 'text',
          pattern: '',
          isRequired: true,
          placeHolder: 'Selecciona una fecha',
          isDisabled: false,
          isHidden: false
        }"
      ></app-date>
    </div>
  </div>

  <div class="w-full flex md:w-1/3 py-3 md:py-0 items-center gap-2">
    <span class="flex items-center text-base font-rbt-bold whitespace-nowrap shrink-0 min-w-[90px]">
      Inicio Vigencia:
    </span>

    <div class="w-4/5 max-w-[180px] pl-2 md:pl-4">
      <app-date
        class="w-full relative z-10 pointer-events-auto"
        [dateConfig]="{
          type: 'text',
          pattern: '',
          isRequired: true,
          placeHolder: 'Selecciona una fecha',
          isDisabled: false,
          isHidden: false
        }"
      ></app-date>
    </div>
  </div>

  <div class="w-full flex md:w-1/3 md:pl-4">
    <span class="w-1/5 flex items-center text-base font-rbt-bold"> Fin Vigencia: </span>

    <div class="w-4/5 max-w-[180px] pl-2 md:pl-4">
      <app-date
        class="w-full relative z-10 pointer-events-auto"
        [dateConfig]="{
          type: 'text',
          pattern: '',
          isRequired: true,
          placeHolder: 'Selecciona una fecha',
          isDisabled: false,
          isHidden: false
        }"
      >
      </app-date>
    </div>
  </div>
</div>

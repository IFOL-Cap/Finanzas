<h2 class="font-rbt-rglr text-xl font-bold mb-4">
  Envio de Fianzas por Correo Electronico
</h2>

<div class="grid grid-cols-6 md:flex md:justify-between border-t py-4 border-gray-200 dark:border-gray-700">
  <div class="col-span-6 flex flex-col md:flex-row md:items-center md:justify-start w-full md:w-auto">
  </div>
</div>

<app-accordion-reusable class="flex flex-col">
  <app-accordion-reusable-item title="Formulario de Envio">
    <div class="py-4">

      <div class="flex w-full items-center py-5 border-b border-gray-division-section">
        <app-label-input class="w-full" [labelHelp]="{
      isRequired: true,
      isWithHelp: true,
      isWithSubtitle: false,
      title: 'Fianza No.:',
      subtitle: '',
      position: 'right',
      helpMsg: 'ayuda',
    }" [inputConfig]="{
      type: 'text',
      pattern: '',
      isRequired: true,
      placeHolder: 'Ingresa numero de fianza',
      isDisabled: false,
      isHidden: false,
      isRead: false,
    }" [control]="fianzaNoCtrl" />
      </div>

      <div class="flex w-full items-center py-5 border-b border-gray-division-section">
        <app-label-input class="w-full" [labelHelp]="{
      isRequired: true,
      isWithHelp: true,
      isWithSubtitle: false,
      title: 'Endoso:',
      subtitle: '',
      position: 'right',
      helpMsg: 'ayuda',
    }" [inputConfig]="{
      type: 'text',
      pattern: '',
        isRequired: true,
      placeHolder: 'Ingresa endoso',
      isDisabled: false,
      isHidden: false,
      isRead: false,
    }" [control]="endosoCtrl" />
      </div>

      <div class="flex w-full items-center py-5 border-b border-gray-division-section">
        <app-label-input class="w-full" [labelHelp]="{
      isRequired: true,
      isWithHelp: true,
      isWithSubtitle: false,
      title: 'Asunto:',
      subtitle: '',
      position: 'right',
      helpMsg: 'ayuda',
    }" [inputConfig]="{
      type: 'text',
      pattern: '',
      isRequired: true,
      placeHolder: 'Ingresa asunto del correo',
      isDisabled: false,
      isHidden: false,
      isRead: false,
    }" [control]="asuntoCtrl" />
      </div>

      <div class="flex w-full items-center py-5 border-b border-gray-division-section">
        <app-label-input class="w-full" [labelHelp]="{
      isRequired: true,
      isWithHelp: true,
      isWithSubtitle: false,
      title: 'Destinatario(s):',
      subtitle: '',
      position: 'right',
      helpMsg: 'ayuda',
    }" [inputConfig]="{
      type: 'text',
      pattern: '',
      isRequired: true,
      placeHolder: 'Ingresa uno o varios correos separados por coma',
      isDisabled: false,
      isHidden: false,
      isRead: false,
    }" [control]="destinatariosCtrl" />
      </div>

      <div class="flex w-full items-center py-5 border-b border-gray-division-section">
        <app-label-checkbox [labelCheck]="'Si'" class="w-full" [labelHelp]="{
      isRequired: false,
      isWithHelp: true,
      isWithSubtitle: false,
      title: 'Omitir Vigencia:',
      subtitle: '',
      position: 'right',
      helpMsg: 'ayuda',
    }" (isChecked)="onOmitirVigenciaChange($event)" [itemsChecks]="[
      {
        labeltitle: 'Si',
      },
    ]" />
      </div>

      <div class="flex w-full items-center py-5 border-b border-gray-division-section">
        <app-label-text-area class="w-full" [control]="comentarioCtrl"
        [labelHelp]="{
      isRequired: false,
      isWithHelp: true,
      isWithSubtitle: false,
      title: 'Comentario:',
      subtitle: '',
      position: 'right',
      helpMsg: 'ayuda',
    }" [inputConfig]="{
      type: 'text',
      pattern: '',
      isRequired: false,
      placeHolder: 'Escribe un comentario para el envio',
      isDisabled: false,
      isHidden: false,
      isRead: false,
    }" />
      </div>

      <div class="w-full mt-5 pb-5 inline-block md:flex md:justify-center">
        <app-button class="mr-4" (click)="limpiarFormulario()" [buttonConfig]="{
      type: 2,
      label: '',
    }">
          Limpiar
        </app-button>

        <app-button (click)="enviarCorreo()" [buttonConfig]="{
      type: 0,
      label: '',
    }">
          Enviar Correo
        </app-button>
      </div>

    </div>
  </app-accordion-reusable-item>
</app-accordion-reusable>

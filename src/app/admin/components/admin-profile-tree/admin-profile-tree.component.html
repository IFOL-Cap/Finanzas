<div class="pt-10">
  <app-accordion-reusable class="flex flex-col gap-1">
    <app-accordion-reusable-item [title]="title">
      <div class="py-2">
        <app-tree-view-profile
          [nodes]="nodes"
          [level]="level"
          [menuActions]="menuActions"
          (menuAction)="menuAction.emit($event)"
        ></app-tree-view-profile>
      </div>
    </app-accordion-reusable-item>
  </app-accordion-reusable>
</div>
